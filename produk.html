  <meta name="description" content="Koleksi Cokelat Premium Nusantara ChocoNesia.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="nav-inner container">
      <a href="index.html" class="nav-logo">
        <i class="fas fa-crown"></i> ChocoNesia
      </a>
      <ul id="nav-menu" class="nav-menu">
        <li><a href="index.html#hero" class="nav-link">Beranda</a></li>
        <li><a href="produk.html" class="nav-link active">Produk</a></li>
        <li><a href="index.html#about" class="nav-link">Tentang</a></li>
        <li><a href="index.html#timeline" class="nav-link">Proses</a></li>
        <li><a href="index.html#testimonials" class="nav-link">Testimoni</a></li>
        <li><a href="index.html#faq" class="nav-link">FAQ</a></li>
        <li><a href="index.html#contact" class="nav-link">Kontak</a></li>
      </ul>
      <div class="nav-actions">
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
          <i class="fas fa-moon"></i>
        </button>
        <button id="hamburger" class="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>
  <div id="scroll-bar" class="scroll-bar"></div>

  <div data-scroll-container id="scroll-container">

    <!-- HERO -->
    <div class="produk-hero">
      <span class="produk-hero-badge"><i class="fas fa-crown"></i> Koleksi Premium</span>
      <h1>Produk <span>ChocoNesia</span></h1>
      <p>Setiap produk dibuat dari kakao pilihan petani Indonesia dengan standar kualitas internasional.</p>
    </div>

    <!-- TOOLBAR -->
    <div class="produk-toolbar">
      <div class="container">
        <div class="toolbar-inner">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Cari produk...">
          </div>
          <!-- <div class="filter-tabs" id="filter-tabs">
            <button class="filter-btn active" data-cat="semua">Semua</button>
            <button class="filter-btn" data-cat="dark">Dark Chocolate</button>
            <button class="filter-btn" data-cat="milk">Milk Chocolate</button>
            <button class="filter-btn" data-cat="powder">Cocoa Powder</button>
            <button class="filter-btn" data-cat="artisan">Artisan</button>
          </div> -->
          <select class="sort-select" id="sort-select">
            <option value="default">Urutan Default</option>
            <option value="price-asc">Harga: Termurah</option>
            <option value="price-desc">Harga: Termahal</option>
            <option value="name-asc">Nama: A–Z</option>
            <option value="name-desc">Nama: Z–A</option>
          </select>
        </div>
      </div>
    </div>

    <!-- PRODUK GRID -->
    <section class="produk-section">
      <div class="container">
        <!-- <p class="produk-count">Menampilkan <span id="count-label">8</span> produk</p> -->
        <div id="produk-grid" class="products-grid"></div>
      </div>
    </section>
  </div>

  <!-- PRODUCT MODAL -->
  <div id="product-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button id="modal-close" class="modal-close"><i class="fas fa-times"></i></button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- BACK TO TOP -->
  <button id="back-to-top" class="back-to-top"><i class="fas fa-arrow-up"></i></button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.js"></script>

  <script src="js/produk.js"></script>
